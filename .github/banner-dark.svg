<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7139" />
      <stop offset="50%" style="stop-color:#e05d44" />
      <stop offset="100%" style="stop-color:#ff4088" />
    </linearGradient>
    <linearGradient id="icon-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7139" />
      <stop offset="100%" style="stop-color:#e05d44" />
    </linearGradient>
  </defs>

  <rect width="700" height="180" rx="12" fill="url(#bg)" />
  <rect x="0" y="0" width="700" height="3" rx="1.5" fill="url(#accent)" />

  <!-- Browser window icon with crosshair -->
  <g transform="translate(50, 32)">
    <!-- Browser frame -->
    <rect x="10" y="0" width="80" height="60" rx="6" fill="none" stroke="url(#icon-fill)" stroke-width="2.2"/>
    <!-- Title bar -->
    <line x1="10" y1="14" x2="90" y2="14" stroke="url(#icon-fill)" stroke-width="1.5" opacity="0.5"/>
    <!-- Title bar dots -->
    <circle cx="20" cy="7" r="2.2" fill="#ff5f57"/>
    <circle cx="28" cy="7" r="2.2" fill="#febc2e"/>
    <circle cx="36" cy="7" r="2.2" fill="#28c840"/>
    <!-- Crosshair target in browser -->
    <circle cx="50" cy="38" r="14" fill="none" stroke="url(#icon-fill)" stroke-width="2" opacity="0.3"/>
    <circle cx="50" cy="38" r="6" fill="none" stroke="url(#icon-fill)" stroke-width="2"/>
    <line x1="50" y1="20" x2="50" y2="28" stroke="url(#icon-fill)" stroke-width="2"/>
    <line x1="50" y1="48" x2="50" y2="56" stroke="url(#icon-fill)" stroke-width="2"/>
    <line x1="32" y1="38" x2="40" y2="38" stroke="url(#icon-fill)" stroke-width="2"/>
    <line x1="60" y1="38" x2="68" y2="38" stroke="url(#icon-fill)" stroke-width="2"/>
    <!-- Shield overlay -->
    <path d="M50 68 C50 68 35 63 35 78 C35 88 42 96 50 100 C58 96 65 88 65 78 C65 63 50 68 50 68Z"
          fill="url(#icon-fill)" opacity="0.15" stroke="url(#icon-fill)" stroke-width="1.8"/>
    <text x="50" y="88" font-family="system-ui, sans-serif" font-size="14" fill="url(#icon-fill)" text-anchor="middle" font-weight="700">!</text>
  </g>

  <text x="165" y="68" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">
    hackbrowser-mcp
  </text>

  <text x="165" y="98" font-family="'SF Pro Text', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e" letter-spacing="0.2">
    Browser-based security testing for AI agents
  </text>

  <g transform="translate(165, 118)">
    <rect x="0" y="0" width="78" height="26" rx="13" fill="#ff7139" opacity="0.12" stroke="#ff7139" stroke-width="1" stroke-opacity="0.3"/>
    <text x="39" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ff7139" text-anchor="middle" font-weight="600">39 tools</text>

    <rect x="90" y="0" width="72" height="26" rx="13" fill="#e05d44" opacity="0.12" stroke="#e05d44" stroke-width="1" stroke-opacity="0.3"/>
    <text x="126" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#e05d44" text-anchor="middle" font-weight="600">Firefox</text>

    <rect x="174" y="0" width="58" height="26" rx="13" fill="#ff4088" opacity="0.12" stroke="#ff4088" stroke-width="1" stroke-opacity="0.3"/>
    <text x="203" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ff4088" text-anchor="middle" font-weight="600">MCP</text>

    <rect x="244" y="0" width="110" height="26" rx="13" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" stroke-opacity="0.3"/>
    <text x="299" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#f97316" text-anchor="middle" font-weight="600">60+ payloads</text>
  </g>
</svg>
